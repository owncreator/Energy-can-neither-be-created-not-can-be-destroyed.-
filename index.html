<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Quantum Energy Field with Shaders &amp; Bloom | Threejs</title>
    

  </head>
    
  <body>
  <style>
* { margin: 0; padding: 0; }
canvas { width: 100%; height: 100%; }
#container { width: 100%; height: 100%; }
</style>

<div id="container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
document.getElementById('container').appendChild(renderer.domElement);

const quantumFieldShader = {
  uniforms: {
    time: { value: 0 },
    resolution: { value: new THREE.Vector2() }
  },
  vertexShader: `
    varying vec3 vPosition;
    varying vec3 vNormal;
    uniform float time;
    void main() {
      vPosition = position;
      vNormal = normal;
      vec3 pos = position;
      float displacement = sin(pos.x * 5.0 + time) * 
                         cos(pos.y * 3.0 + time) * 
                         sin(pos.z * 4.0 + time) * 0.15;
      vec3 newPosition = position + normal * displacement;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec3 vPosition;
    varying vec3 vNormal;
    vec3 palette(float t) {
      vec3 a = vec3(0.5, 0.5, 0.5);
      vec3 b = vec3(0.5, 0.5, 0.5);
      vec3 c = vec3(1.0, 1.0, 1.0);
      vec3 d = vec3(0.263, 0.416, 0.557);
      return a + b * cos(6.28318 * (c * t + d));
    }
    void main() {
      float pattern = sin(vPosition.x * 10.0 + time) * 
                     cos(vPosition.y * 8.0 + time * 0.8) * 
                     sin(vPosition.z * 6.0 + time * 1.2);
      vec3 color = palette(pattern * 0.5 + 0.5);
      float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
      gl_FragColor = vec4(color + fresnel * 0.5, 0.7);
    }
  `
};

const fieldGeometry = new THREE.IcosahedronGeometry(2, 5);
const fieldMaterial = new THREE.ShaderMaterial({
  uniforms: quantumFieldShader.uniforms,
  vertexShader: quantumFieldShader.vertexShader,
  fragmentShader: quantumFieldShader.fragmentShader,
  transparent: true,
  side: THREE.DoubleSide
});

const quantumField = new THREE.Mesh(fieldGeometry, fieldMaterial);
scene.add(quantumField);

const streamCount = 8;
const curves = [];
const streamMeshes = [];

for(let i = 0; i < streamCount; i++) {
  const points = [];
  const radius = 1.5 + Math.random() * 0.5;
  const turns = 2 + Math.random();
  const pointCount = 100;
  
  for(let j = 0; j < pointCount; j++) {
    const t = j / (pointCount - 1);
    const angle = t * Math.PI * 2 * turns + (i * Math.PI * 2 / streamCount);
    points.push(new THREE.Vector3(
      Math.cos(angle) * radius,
      (t - 0.5) * 2,
      Math.sin(angle) * radius
    ));
  }
  
  const curve = new THREE.CatmullRomCurve3(points);
  curves.push(curve);
  
  const tubeGeometry = new THREE.TubeGeometry(curve, 100, 0.02, 8, false);
  const tubeMaterial = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      color: { value: new THREE.Color(0.1, 0.5 + Math.random() * 0.5, 1.0) }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      uniform vec3 color;
      varying vec2 vUv;
      void main() {
        float pattern = fract(vUv.x * 10.0 - time * 2.0);
        pattern = smoothstep(0.0, 0.3, pattern) * smoothstep(1.0, 0.7, pattern);
        gl_FragColor = vec4(color * pattern, pattern * 0.8);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending
  });
  
  const tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
  streamMeshes.push(tubeMesh);
  scene.add(tubeMesh);
}

const particleCount = 10000;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const velocities = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount; i++) {
  const i3 = i * 3;
  const radius = Math.random() * 3;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(Math.random() * 2 - 1);
  
  positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
  positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
  positions[i3 + 2] = radius * Math.cos(phi);
  
  velocities[i3] = (Math.random() - 0.5) * 0.01;
  velocities[i3 + 1] = (Math.random() - 0.5) * 0.01;
  velocities[i3 + 2] = (Math.random() - 0.5) * 0.01;
  
  colors[i3] = Math.random();
  colors[i3 + 1] = Math.random() * 0.5 + 0.5;
  colors[i3 + 2] = 1.0;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.02,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5, 0.4, 0.85
);
bloomPass.threshold = 0.2;
bloomPass.strength = 1.5;
bloomPass.radius = 0.8;

const customPass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    varying vec2 vUv;
    void main() {
      vec2 uv = vUv;
      vec2 direction = normalize(uv - 0.5);
      float dist = length(uv - 0.5);
      float waveFactor = sin(dist * 10.0 - time) * 0.01;
      vec2 offset = direction * waveFactor;
      vec4 color = texture2D(tDiffuse, uv + offset);
      color.rgb *= 1.0 + waveFactor * 5.0;
      gl_FragColor = color;
    }
  `
});

composer.addPass(renderPass);
composer.addPass(bloomPass);
composer.addPass(customPass);

camera.position.set(0, 0, 5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  quantumField.material.uniforms.time.value = time;
  streamMeshes.forEach((mesh, i) => {
    mesh.material.uniforms.time.value = time;
    mesh.rotation.y = time * (0.1 + i * 0.05);
  });
  const positions = particleGeometry.attributes.position.array;
  for(let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    positions[i3] += velocities[i3];
    positions[i3 + 1] += velocities[i3 + 1];
    positions[i3 + 2] += velocities[i3 + 2];
    const radius = Math.sqrt(
      positions[i3] * positions[i3] +
      positions[i3 + 1] * positions[i3 + 1] +
      positions[i3 + 2] * positions[i3 + 2]
    );
    if(radius > 3.5 || radius < 1.0) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 2 - 1);
      const newRadius = 2 + Math.random();
      positions[i3] = newRadius * Math.sin(phi) * Math.cos(theta);
      positions[i3 + 1] = newRadius * Math.sin(phi) * Math.sin(theta);
      positions[i3 + 2] = newRadius * Math.cos(phi);
    }
  }
  particleGeometry.attributes.position.needsUpdate = true;
  customPass.uniforms.time.value = time;
  controls.update();
  composer.render();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
    <script  src="./script.js"></script>

  </body>
  
</html>
